<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <radialGradient id="bg" cx="50%" cy="50%" r="75%">
            <stop offset="0%" stop-color="#090B10"/>
            <stop offset="100%" stop-color="#020305"/>
        </radialGradient>

        <filter id="ambientBlur" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="32"/>
        </filter>

        <filter id="flareGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="8" result="blur1"/>
            <feGaussianBlur stdDeviation="16" result="blur2"/>
            <feMerge>
                <feMergeNode in="blur2"/>
                <feMergeNode in="blur1"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <linearGradient id="topEdge" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#00E5FF" stop-opacity="1"/>
            <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.05"/>
        </linearGradient>
        <linearGradient id="topFill" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.0"/>
        </linearGradient>

        <linearGradient id="botEdge" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#B033FF" stop-opacity="1"/>
            <stop offset="100%" stop-color="#B033FF" stop-opacity="0.05"/>
        </linearGradient>
        <linearGradient id="botFill" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#B033FF" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#B033FF" stop-opacity="0.0"/>
        </linearGradient>

        <linearGradient id="fadeLineX" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
            <stop offset="50%" stop-color="#FFFFFF" stop-opacity="1"/>
            <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <rect width="512" height="512" fill="url(#bg)"/>

    <circle cx="256" cy="180" r="100" fill="#00E5FF" opacity="0.15" filter="url(#ambientBlur)"/>
    <circle cx="256" cy="330" r="100" fill="#B033FF" opacity="0.15" filter="url(#ambientBlur)"/>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <rect id="bg" width="512" height="512" fill="#06080D"/>

        <filter id="ambientBlur" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="40"/>
        </filter>

        <filter id="flareGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" result="blur1"/>
            <feGaussianBlur stdDeviation="16" result="blur2"/>
            <feMerge>
                <feMergeNode in="blur2"/>
                <feMergeNode in="blur1"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <linearGradient id="topEdge" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#00FFFF" stop-opacity="1"/>
            <stop offset="100%" stop-color="#0088FF" stop-opacity="0.3"/>
        </linearGradient>
        <linearGradient id="topFill" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#0055FF" stop-opacity="0.1"/>
        </linearGradient>

        <linearGradient id="botEdge" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#E055FF" stop-opacity="1"/>
            <stop offset="100%" stop-color="#7700FF" stop-opacity="0.3"/>
        </linearGradient>
        <linearGradient id="botFill" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#E055FF" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#5500FF" stop-opacity="0.1"/>
        </linearGradient>

        <clipPath id="intersectClip">
            <rect x="150" y="80" width="212" height="212" rx="44" transform="rotate(45 256 186)"/>
        </clipPath>

        <linearGradient id="fadeLineX" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
            <stop offset="30%" stop-color="#FFFFFF" stop-opacity="1"/>
            <stop offset="70%" stop-color="#FFFFFF" stop-opacity="1"/>
            <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <use href="#bg"/>

    <circle cx="256" cy="160" r="120" fill="#00E5FF" opacity="0.3" filter="url(#ambientBlur)"/>
    <circle cx="256" cy="350" r="120" fill="#B033FF" opacity="0.3" filter="url(#ambientBlur)"/>

    <g stroke-width="3">
        <rect x="150" y="220" width="212" height="212" rx="44" 
              transform="rotate(45 256 326)" 
              fill="url(#botFill)" stroke="url(#botEdge)"/>
              
        <rect x="150" y="80" width="212" height="212" rx="44" 
              transform="rotate(45 256 186)" 
              fill="url(#topFill)" stroke="url(#topEdge)"/>
    </g>

    <g clip-path="url(#intersectClip)">
        <rect x="150" y="220" width="212" height="212" rx="44" 
              transform="rotate(45 256 326)" 
              fill="#FFFFFF" opacity="0.15"/>
        <rect x="150" y="220" width="212" height="212" rx="44" 
              transform="rotate(45 256 326)" 
              fill="#00E5FF" opacity="0.15"/>
    </g>

    <g filter="url(#flareGlow)">
        <circle cx="256" cy="256" r="12" fill="#FFFFFF"/>
        <ellipse cx="256" cy="256" rx="120" ry="2.5" fill="url(#fadeLineX)"/>
        <ellipse cx="256" cy="256" rx="1.5" ry="40" fill="url(#fadeLineX)" transform="rotate(90 256 256)" opacity="0.6"/>
    </g>
</svg>
    <g stroke-width="2.5">
        <rect x="150" y="220" width="212" height="212" rx="44" 
              transform="rotate(45 256 326)" 
              fill="url(#botFill)" stroke="url(#botEdge)"/>
              
        <rect x="150" y="80" width="212" height="212" rx="44" 
              transform="rotate(45 256 186)" 
              fill="url(#topFill)" stroke="url(#topEdge)"/>
    </g>

    <g filter="url(#flareGlow)">
        <circle cx="256" cy="256" r="9" fill="#FFFFFF"/>
        <ellipse cx="256" cy="256" rx="90" ry="1.5" fill="url(#fadeLineX)"/>
        <ellipse cx="256" cy="256" rx="1.5" ry="90" fill="url(#fadeLineX)" transform="rotate(90 256 256)"/>
    </g>
</svg>